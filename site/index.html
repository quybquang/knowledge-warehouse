<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knowledge Warehouse — a source of truth your AI agents can't corrupt</title>
    <meta name="description" content="Open-source knowledge harness for AI-assisted teams. AI proposes, humans approve, git remembers. Every business rule has a stable ID, a source, and a git history." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0B0E" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F6F3EC" />
    <script>
      // set theme before first paint to avoid a flash of the wrong theme
      (function () {
        var t;
        try { t = localStorage.getItem('kw-theme'); } catch (e) {}
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
